<!DOCTYPE html>
<html lang="en">

<head>
    <title>SneakerLab AI | Footwear Classification</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="container-fluid">
        <header>
            <h1>Footwear Classification</h1>
            <p class="subtitle">Deep Learning Driven Footwear Analysis</p>
        </header>

        <main>
            <div class="card border-0 bg-transparent">
                <div class="card-body p-0">
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-zone-content">
                            <span class="mb-3 d-block" style="font-size: 3rem;">👟</span>
                            <p>Drag & drop your shoe here</p>
                            <span class="text-muted" style="font-size: 0.85rem;">or click to browse files</span>
                        </div>
                        <input type="file" accept="image/png, image/jpeg" id="image" name="image"
                            onchange="checkFiles(this.files);">
                    </div>
                    <p class="text-center text-muted mt-2" style="font-size: 0.8rem;">Supported: JPG, PNG • Max 10MB</p>
                </div>
            </div>

            <div id="answerPart" class="hidden">
                <div class="results-container">
                    <section class="preview-section">
                        <h5>Analyzed Footwear</h5>
                        <img id="preview" src="#" alt="Footwear Preview" />
                    </section>

                    <section class="analysis-section">
                        <div id="loadingPart" class="loading" style="display: none;">
                            <div class="spinner-border" role="status">
                                <span class="sr-only">Analyzing...</span>
                            </div>
                            <p class="mt-3 font-weight-bold" style="color: var(--primary);">Scanning Neural Pathways...</p>
                        </div>

                        <div id="resultsPart" class="results-section" style="display: none;">
                            <h5>Classification Analysis</h5>
                            <div id="classificationList"></div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <footer class="mt-5 pt-4 text-center border-top">
            <p class="text-muted mb-0" style="font-size: 0.75rem;">Powered by DeepJavaLibrary & Spring Boot</p>
        </footer>
    </div>

</body>

</html>
